name: obdreader2
description: "ÓE-BD2 – OBD-II diagnosztika"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  flutter_bluetooth_serial: ^0.4.0
  flutter_blue_plus: ^2.2.1
  permission_handler: ^12.0.1
  provider: ^6.1.5
  fl_chart: ^0.71.0

  drift: ^2.32.0
  sqlite3_flutter_libs: ^0.5.42
  path: ^1.9.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  http: ^1.6.0
  flutter_local_notifications: ^19.5.0
  geolocator: ^13.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

  drift_dev: ^2.32.0
  build_runner: ^2.13.0

flutter:
  uses-material-design: true

  assets:
    - assets/bluetooth_connected.png
    - assets/icon/app_icon.png
    - assets/splash.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 24

flutter_native_splash:
  color: "#ffffff"
  image: assets/splash.png
  android: true
  ios: true
